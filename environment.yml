name: skincancer
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - pillow
  - opencv
  - pip
  - pip:
    - torch>=1.10
    - torchvision>=0.11
    - timm
    - kornia
    - tqdm
    - torchmetrics
    - PyYAML
    - pytorch-grad-cam
    - hydra-core>=1.3
    - omegaconf>=2.3
    - wandb>=0.17
    - optuna>=3.0

# Install a CUDA build of torch/torchvision matching your GPU/driver, e.g.:
#   pip install --force-reinstall --no-deps torch torchvision \
#       --index-url https://download.pytorch.org/whl/cu124
