# @package _global_
# EfficientNet-B0 + MetaBlock attention metadata fusion (Pacheco & Krohling 2021).
defaults:
  - override /model: efficientnet_b0
  - override /optim: adamw
  - override /loss: cross_entropy
  - override /sampler: class_balanced_sqrt
  - override /training_mode: image_meta

experiment_setup:
  experiment_name: b0_metablock

model:
  meta_fusion: metablock

training:
  num_epochs: 40
  batch_size: 64
