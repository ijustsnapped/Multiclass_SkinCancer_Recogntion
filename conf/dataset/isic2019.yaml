# @package _global_
# ISIC 2019 — 8 classes (AK, BCC, BKL, DF, MEL, NV, SCC, VASC).
# Build the files below with scripts/download_isic2019.py + scripts/prepare_isic2019.py.
paths:
  labels_csv: splits/training/labels.csv
  train_root: splits/training
  meta_csv: splits/training/hot_one_meta.csv
  log_dir: outputs/logs        # per-fold metrics.csv + W&B run artifacts (no TensorBoard)
  ckpt_dir: outputs/checkpoints

data:
  num_workers: 6        # Ryzen 5 5600X: 6 physical cores / 12 threads. 0 = main process (instant start).
  persistent_workers: true
  prefetch_factor: 4
  image_loader: pil
  enable_ram_cache: false
  cpu_augmentations:
    resize: 256
    crop_size: 224
    norm_mean: [0.485, 0.456, 0.406]
    norm_std: [0.229, 0.224, 0.225]
    train:
      random_horizontal_flip_p: 0.5
      random_vertical_flip_p: 0.5
      # RandAugment already samples geometric (rotate/shear/translate) and photometric
      # (brightness/contrast/color/sharpness) ops, so stacking RandomAffine + ColorJitter
      # on top is redundant CPU work (~2x the per-image transform cost) and over-distorts.
      # Keep flips + RandAugment. Re-add affine_*/color_jitter_* below to opt back in.
      rand_aug_n: 2
      rand_aug_m: 9
  gpu_augmentations:
    enable: false
    pipeline: []
